name: build-test-xrootd-by-service-version

on:
  workflow_dispatch:
    inputs:
      xrootd_version:
        description: "xrootd version-release for el9 (e.g. 5.9.1-1.el9)"
        required: true
        default: "5.9.1-1.el9"
        # This value is passed through to the Docker build as `XROOTD_VERSION`.
        # If you leave the input as-is when triggering the workflow, the Dockerfile
        # will pin `xrootd*` packages to this exact RPM version-release.

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout containers repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Derive image tag
        id: derive_tag
        run: |
          XROOTD_VERSION="${{ github.event.inputs.xrootd_version }}"
          # Drop the release/dist suffix for the tag (e.g. 5.9.1-1.el9 -> 5.9.1)
          VERSION_MAJOR="$(echo "${XROOTD_VERSION}" | cut -d- -f1)"
          IMAGE_TAG="rucio/test-xrootd:xrootd-${VERSION_MAJOR}-el9"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.0

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push test-xrootd for given XRootD production bundle
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.0
        with:
          context: ./test-xrootd
          file: ./test-xrootd/Dockerfile
          push: true
          tags: ${{ steps.derive_tag.outputs.image_tag }}
          build-args: |
            XROOTD_VERSION=${{ github.event.inputs.xrootd_version }}

