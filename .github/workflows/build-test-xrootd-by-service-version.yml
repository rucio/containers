name: build-test-xrootd-by-service-version

on:
  workflow_dispatch:
    inputs:
      xrootd_version:
        description: "xrootd version-release for el9 (e.g. 5.9.2-1.el9.x86_64)"
        required: true
        default: "5.9.2-1.el9.x86_64"
        # This value is passed through to the Docker build as `XROOTD_VERSION`.
        # If you leave the input as-is when triggering the workflow, the Dockerfile
        # will pin `xrootd*` packages to this exact RPM version-release.

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout containers repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Derive image tag
        id: derive_tag
        run: |
          XROOTD_VERSION="${{ github.event.inputs.xrootd_version }}"
          # Drop the release/dist suffix for the tag (e.g. 5.9.2-1.el9.x86_64 -> 5.9.2)
          VERSION_MAJOR="$(echo "${XROOTD_VERSION}" | cut -d- -f1)"
          IMAGE_TAG="rucio/test-xrootd:xrootd-${VERSION_MAJOR}-el9"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Check if image already exists on Docker Hub
        id: check_exists
        run: |
          IMAGE="${{ steps.derive_tag.outputs.image_tag }}"
          if docker manifest inspect "${IMAGE}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image ${IMAGE} already exists, skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image ${IMAGE} does not exist, will build."
          fi

      - name: Set up Docker Buildx
        if: steps.check_exists.outputs.exists == 'false'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.0

      - name: Login to Docker Hub
        if: steps.check_exists.outputs.exists == 'false'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push test-xrootd for given XRootD production bundle
        if: steps.check_exists.outputs.exists == 'false'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.0
        with:
          context: ./test-xrootd
          file: ./test-xrootd/Dockerfile
          push: true
          tags: ${{ steps.derive_tag.outputs.image_tag }}
          build-args: |
            XROOTD_VERSION=${{ github.event.inputs.xrootd_version }}

